name: Deploy Next.js Frontend to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & Build Frontend
        run: |
          npm install
          npm run build

      - name: Zip Frontend Artifacts
        run: |
          # Create a deployment directory excluding node_modules and source files
          mkdir deploy_dir
          cp -r .next deploy_dir/
          cp -r public deploy_dir/
          cp package.json deploy_dir/
          cp package-lock.json deploy_dir/
          cp next.config.ts deploy_dir/
          cd deploy_dir
          zip -r ../deploy.zip .
          cd ..

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mrlegezt-frontend'
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: './deploy.zip'
